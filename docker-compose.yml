services:
  odysseus:
    build: .
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-7000}:7000"
    volumes:
      - ${APP_DATA_DIR:-./data}:/app/data:z
      - ${APP_LOGS_DIR:-./logs}:/app/logs:z
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LLM_HOST=127.0.0.1
      - OPENAI_API_KEY=dummy
      - OPENAI_API_BASE=http://host.docker.internal:20128/v1
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/app.db}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - LOCALHOST_BYPASS=${LOCALHOST_BYPASS:-true}
      - ODYSSEUS_ADMIN_USER=${ODYSSEUS_ADMIN_USER:-admin}
      - ODYSSEUS_ADMIN_PASSWORD=${ODYSSEUS_ADMIN_PASSWORD:-}
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - EMBEDDING_URL=${EMBEDDING_URL:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      # Desktop Bridge (Windows host)
      - ODY_BRIDGE_URL=${ODY_BRIDGE_URL:-http://host.docker.internal:8765}
      - ODY_BRIDGE_TOKEN=${ODY_BRIDGE_TOKEN:-}
      - ODYSSEUS_INPROCESS_POLLERS=0
      - ODYSSEUS_INPROCESS_TASKS=1
      - ODYSSEUS_SCRIPT_HOST=localhost
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    depends_on:
      chromadb:
        condition: service_started
    restart: unless-stopped

  chromadb:
    image: docker.io/chromadb/chroma:latest
    ports:
      - "${CHROMADB_BIND:-127.0.0.1}:8100:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

volumes:
  chromadb-data:
